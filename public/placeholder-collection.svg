<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="warm" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fbf6ec"/>
      <stop offset="100%" stop-color="#f2ead5"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a24c"/>
      <stop offset="100%" stop-color="#e5c778"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#warm)"/>

  <!-- Fragrance bottle (left) -->
  <g transform="translate(260 430)" fill="none" stroke="#1e2c4d" stroke-opacity="0.55" stroke-linejoin="round" stroke-linecap="round">
    <!-- Cap -->
    <rect x="-32" y="-172" width="64" height="42" rx="4" stroke-width="2"/>
    <!-- Neck -->
    <rect x="-22" y="-130" width="44" height="26" stroke-width="2"/>
    <!-- Bottle body -->
    <path d="M -84 -104 L -84 108 Q -84 128 -64 128 L 64 128 Q 84 128 84 108 L 84 -104 Q 84 -114 74 -114 L -74 -114 Q -84 -114 -84 -104 Z" stroke-width="2" fill="#ffffff" fill-opacity="0.65"/>
    <!-- Label -->
    <rect x="-46" y="-24" width="92" height="72" rx="2" stroke-width="1.2" stroke-opacity="0.35" fill="none"/>
    <text x="0" y="8" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="18" fill="#c9a24c" stroke="none">Livin'</text>
    <line x1="-24" y1="20" x2="24" y2="20" stroke="#c9a24c" stroke-opacity="0.6" stroke-width="0.8"/>
    <text x="0" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="8" letter-spacing="3" fill="#c9a24c" stroke="none">OUD</text>
  </g>

  <!-- Gift box (right, slightly behind) -->
  <g transform="translate(520 500)" stroke="#1e2c4d" stroke-opacity="0.55" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- Box body -->
    <rect x="-90" y="-8" width="180" height="120" stroke-width="2" fill="#fbf3df"/>
    <!-- Box lid -->
    <rect x="-100" y="-28" width="200" height="30" stroke-width="2" fill="#f5ead0"/>
    <!-- Vertical ribbon -->
    <rect x="-10" y="-30" width="20" height="144" fill="url(#ribbon)" stroke="none" opacity="0.85"/>
    <!-- Horizontal ribbon -->
    <rect x="-102" y="-2" width="204" height="16" fill="url(#ribbon)" stroke="none" opacity="0.85"/>
    <!-- Bow left loop -->
    <ellipse cx="-22" cy="-32" rx="16" ry="10" fill="url(#ribbon)" stroke="#c9a24c" stroke-width="1" opacity="0.9"/>
    <!-- Bow right loop -->
    <ellipse cx="22" cy="-32" rx="16" ry="10" fill="url(#ribbon)" stroke="#c9a24c" stroke-width="1" opacity="0.9"/>
    <!-- Bow knot -->
    <rect x="-6" y="-38" width="12" height="14" rx="2" fill="url(#ribbon)" stroke="#c9a24c" stroke-width="1"/>
  </g>

  <!-- Small floral sprig above -->
  <g transform="translate(400 220)" stroke="#c9a24c" stroke-opacity="0.55" fill="none" stroke-linecap="round">
    <line x1="0" y1="-24" x2="0" y2="24" stroke-width="1"/>
    <circle cx="-12" cy="-12" r="6" fill="#ffffff" stroke-width="1"/>
    <circle cx="12" cy="0" r="5" fill="#ffffff" stroke-width="1"/>
    <circle cx="-6" cy="14" r="4" fill="#ffffff" stroke-width="1"/>
  </g>

  <!-- Caption -->
  <text x="400" y="760" text-anchor="middle" fill="#c9a24c" fill-opacity="0.85" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="10">PHOTOGRAPH</text>
  <text x="400" y="792" text-anchor="middle" fill="#1e2c4d" fill-opacity="0.4" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="4">PLACEHOLDER — GIFT + SCENT</text>
</svg>
